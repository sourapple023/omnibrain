<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Omni Brain X</title>

<style>
body{margin:0;background:#0a0f1f;color:#eaf0ff;font-family:system-ui;height:100vh;display:flex;flex-direction:column}
header{padding:12px;background:#121a33;border-bottom:1px solid #222;font-weight:600}
#chat{flex:1;overflow:auto;padding:15px}
.msg{max-width:800px;margin:10px auto;padding:12px;border-radius:14px;line-height:1.5;white-space:pre-wrap}
.user{background:#5c6cff;margin-left:auto}
.bot{background:#141c33;border:1px solid #2b3554}
footer{display:flex;padding:10px;background:#121a33;border-top:1px solid #222}
input{flex:1;padding:12px;border:none;border-radius:10px;background:#0d1426;color:white;outline:none}
button{margin-left:8px;padding:12px;border:none;border-radius:10px;background:#5c6cff;color:white;cursor:pointer}
</style>
</head>

<body>

<header>OMNI BRAIN X 🧠</header>
<div id="chat"></div>

<footer>
<input id="input" placeholder="Talk to the evolving brain..." />
<button onclick="send()">Send</button>
</footer>

<script>

// =======================
// 🧠 MEMORY SYSTEM
// =======================

class Memory {
  constructor(){
    this.data = JSON.parse(localStorage.getItem("brain_memory") || "{}");
  }
  save(){
    localStorage.setItem("brain_memory", JSON.stringify(this.data));
  }
}

// =======================
// 🧠 LANGUAGE ENGINE
// =======================

class LanguageEngine {
  constructor(memory){
    this.memory = memory;

    if(!this.memory.data.words){
      this.memory.data.words = {}; // word associations
    }
  }

  tokenize(text){
    return text.toLowerCase()
      .replace(/[^a-z0-9\s]/g,"")
      .split(/\s+/)
      .filter(w=>w.length>0);
  }

  learn(sentence){
    const words = this.tokenize(sentence);

    for(let i=0;i<words.length;i++){
      let w = words[i];
      let next = words[i+1];

      if(!this.memory.data.words[w]){
        this.memory.data.words[w] = {};
      }

      if(next){
        if(!this.memory.data.words[w][next]){
          this.memory.data.words[w][next] = 0;
        }
        this.memory.data.words[w][next]++;
      }
    }

    this.memory.save();
  }

  generate(startWord){
    let result = [startWord];
    let current = startWord;

    for(let i=0;i<15;i++){
      let options = this.memory.data.words[current];
      if(!options) break;

      let next = this.weightedRandom(options);
      if(!next) break;

      result.push(next);
      current = next;
    }

    return this.format(result.join(" "));
  }

  weightedRandom(options){
    let total = 0;
    for(let k in options) total += options[k];

    let r = Math.random()*total;
    let sum = 0;

    for(let k in options){
      sum += options[k];
      if(r <= sum) return k;
    }
  }

  format(text){
    return text.charAt(0).toUpperCase() + text.slice(1) + ".";
  }
}

// =======================
// 🧠 BRAIN CORE
// =======================

class Brain {
  constructor(){
    this.memory = new Memory();
    this.lang = new LanguageEngine(this.memory);

    this.state = {
      mood:"learning",
      evolution:1
    };
  }

  think(input){
    // learn from user
    this.lang.learn(input);

    let tokens = this.lang.tokenize(input);

    // try generating from a known word
    for(let word of tokens){
      if(this.memory.data.words[word]){
        return this.lang.generate(word);
      }
    }

    // fallback
    return this.fallback(input);
  }

  fallback(input){
    const starters = ["I think", "Maybe", "It seems", "I'm learning that"];
    const random = starters[Math.floor(Math.random()*starters.length)];

    return random + " " + input;
  }

  evolve(){
    this.state.evolution++;
    this.memory.save();
  }
}

// =======================
// UI
// =======================

const brain = new Brain();
const chat = document.getElementById("chat");
const input = document.getElementById("input");

function addMessage(text,type){
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function send(){
  const text = input.value.trim();
  if(!text) return;

  addMessage(text,"user");
  input.value = "";

  setTimeout(()=>{
    const reply = brain.think(text);
    addMessage(reply,"bot");
  },200);
}

input.addEventListener("keydown",e=>{
  if(e.key==="Enter") send();
});

</script>

</body>
</html>
