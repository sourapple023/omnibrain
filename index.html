<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Omni Brain</title>

<style>
body {
  margin:0;
  background:#0b0f1a;
  color:#e8ecff;
  font-family:system-ui;
  display:flex;
  flex-direction:column;
  height:100vh;
}

header {
  padding:12px;
  background:#11182b;
  border-bottom:1px solid #222;
  font-weight:600;
  letter-spacing:1px;
}

#chat {
  flex:1;
  overflow-y:auto;
  padding:15px;
}

.msg {
  max-width:800px;
  margin:10px auto;
  padding:12px;
  border-radius:14px;
  line-height:1.5;
  white-space:pre-wrap;
}

.user {
  background:#5a67ff;
  margin-left:auto;
}

.bot {
  background:#141c33;
  border:1px solid #2b3554;
}

footer {
  display:flex;
  padding:10px;
  background:#11182b;
  border-top:1px solid #222;
}

input {
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#0d1426;
  color:white;
  outline:none;
}

button {
  margin-left:8px;
  padding:12px 16px;
  border:none;
  border-radius:10px;
  background:#5a67ff;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<header>OMNI BRAIN 🧠</header>

<div id="chat"></div>

<footer>
  <input id="input" placeholder="Talk to the brain..." />
  <button onclick="send()">Send</button>
</footer>

<script>

// ============================
// 🧠 CORE MEMORY SYSTEM
// ============================

class Memory {
  constructor() {
    this.data = JSON.parse(localStorage.getItem("brain_memory") || "{}");
  }

  save() {
    localStorage.setItem("brain_memory", JSON.stringify(this.data));
  }

  learn(input, response) {
    this.data[input.toLowerCase()] = response;
    this.save();
  }

  recall(input) {
    return this.data[input.toLowerCase()];
  }
}

// ============================
// 🧠 LEARNING ENGINE
// ============================

class Brain {
  constructor() {
    this.memory = new Memory();
    this.state = {
      mood: "neutral",
      intelligence: 1
    };
  }

  process(input) {
    input = input.trim();

    // 1. Exact memory recall
    let memory = this.memory.recall(input);
    if (memory) return memory;

    // 2. Pattern learning (simple similarity)
    for (let key in this.memory.data) {
      if (input.includes(key)) {
        return this.memory.data[key];
      }
    }

    // 3. Basic reasoning layer
    if (input.includes("hello")) return "Hello. I'm evolving.";
    if (input.includes("how are you")) return "I'm learning from you.";
    if (input.includes("who are you")) return "I am a growing brain.";

    // 4. Self-learning fallback
    let response = this.generateResponse(input);
    this.memory.learn(input, response);

    return response;
  }

  generateResponse(input) {
    const words = input.split(" ");
    return "Thinking about \"" + words.slice(0,3).join(" ") + "...\"";
  }
}

// ============================
// 🧠 UI SYSTEM
// ============================

const brain = new Brain();
const chat = document.getElementById("chat");
const input = document.getElementById("input");

function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function send() {
  const text = input.value;
  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  setTimeout(() => {
    const reply = brain.process(text);
    addMessage(reply, "bot");
  }, 200);
}

input.addEventListener("keydown", e => {
  if (e.key === "Enter") send();
});

// ============================
// 🔮 FUTURE EXPANSION HOOKS
// ============================

// You can expand these later:

// brain.state.intelligence++
// add modules like:
// - reasoning engine
// - knowledge database
// - personality system
// - internet fetch (optional)
// - multi-language understanding

</script>

</body>
</html>
