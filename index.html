<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Omni Brain X</title>

<style>
* { box-sizing: border-box; }

html, body {
  margin:0;
  height:100%;
  overflow:hidden;
  background:#0a0f1f;
  color:#eaf0ff;
  font-family:system-ui, -apple-system, sans-serif;
}

body { display:flex; flex-direction:column; }

header {
  padding:calc(12px + env(safe-area-inset-top)) 14px 12px;
  background:#121a33;
  border-bottom:1px solid #26304d;
  font-weight:700;
  position:sticky;
  top:0;
}

#chat {
  flex:1;
  overflow-y:auto;
  padding:14px;
  padding-bottom:90px;
  -webkit-overflow-scrolling:touch;
}

.msg {
  max-width:92%;
  margin:10px 0;
  padding:12px 14px;
  border-radius:18px;
  line-height:1.45;
  font-size:16px;
  white-space:pre-wrap;
  overflow-wrap:anywhere;
}

.user {
  background:#5c6cff;
  margin-left:auto;
}

.bot {
  background:#141c33;
  border:1px solid #2b3554;
}

footer {
  display:flex;
  gap:8px;
  padding:10px;
  padding-bottom:calc(10px + env(safe-area-inset-bottom));
  background:#121a33;
  border-top:1px solid #26304d;
  position:sticky;
  bottom:0;
}

input {
  flex:1;
  padding:14px;
  border-radius:14px;
  border:1px solid #2b3554;
  background:#0d1426;
  color:white;
  font-size:16px;
  outline:none;
}

button {
  padding:14px 16px;
  border:none;
  border-radius:14px;
  background:#5c6cff;
  color:white;
  font-weight:700;
}
</style>
</head>

<body>

<header>OMNI BRAIN X 🧠</header>

<div id="chat"></div>

<footer>
  <input id="input" placeholder="hi..." />
  <button onclick="send()">Send</button>
</footer>

<script>

// =======================
// 🧠 MEMORY
// =======================

class Memory {
  constructor(){
    this.data = JSON.parse(localStorage.getItem("brain_memory") || "{}");
    if(!this.data.words) this.data.words = {};
  }

  save(){
    localStorage.setItem("brain_memory", JSON.stringify(this.data));
  }
}

// =======================
// 🧠 LANGUAGE ENGINE
// =======================

class LanguageEngine {
  constructor(memory){
    this.memory = memory;
  }

  tokenize(text){
    return text.toLowerCase()
      .replace(/[^a-z\s]/g,"") // cleaner
      .split(/\s+/)
      .filter(w => w.length > 1);
  }

  learn(sentence){
    const words = this.tokenize(sentence);

    for(let i=0;i<words.length;i++){
      let w = words[i];
      let next = words[i+1];

      if(!this.memory.data.words[w]){
        this.memory.data.words[w] = {};
      }

      if(next){
        if(!this.memory.data.words[w][next]){
          this.memory.data.words[w][next] = 0;
        }
        this.memory.data.words[w][next]++;
      }
    }

    this.memory.save();
  }

  generate(start){
    let result = [start];
    let current = start;

    for(let i=0;i<12;i++){
      let options = this.memory.data.words[current];
      if(!options) break;

      let next = this.pick(options);
      if(!next) break;

      result.push(next);
      current = next;
    }

    if(result.length < 4) return null;

    return this.format(result.join(" "));
  }

  pick(options){
    let keys = Object.keys(options);

    // stability bias
    if(Math.random() < 0.2){
      return keys[0];
    }

    let total = 0;
    for(let k in options) total += options[k];

    let r = Math.random() * total;
    let sum = 0;

    for(let k in options){
      sum += options[k];
      if(r <= sum) return k;
    }
  }

  format(text){
    return text.charAt(0).toUpperCase() + text.slice(1) + ".";
  }
}

// =======================
// 🧠 BRAIN CORE
// =======================

class Brain {
  constructor(){
    this.memory = new Memory();
    this.lang = new LanguageEngine(this.memory);
  }

  think(input){
    this.lang.learn(input);

    let tokens = this.lang.tokenize(input);

    for(let word of tokens){
      let output = this.lang.generate(word);
      if(output) return output;
    }

    return this.fallback(input);
  }

  fallback(input){
    const starters = [
      "I think",
      "It seems",
      "Maybe",
      "I'm learning that"
    ];
    return starters[Math.floor(Math.random()*starters.length)] + " " + input;
  }
}

// =======================
// 🔁 AUTO TRAINER
// =======================

class AutoTrainer {
  constructor(brain, data){
    this.brain = brain;
    this.data = data;
  }

  start(speed = 800){
    this.interval = setInterval(()=>{
      let s = this.data[Math.floor(Math.random()*this.data.length)];
      this.brain.lang.learn(s);

      let tokens = this.brain.lang.tokenize(s);
      if(tokens.length){
        let gen = this.brain.lang.generate(tokens[0]);
        if(gen) this.brain.lang.learn(gen);
      }
    }, speed);
  }
}

// =======================
// 📚 BASE DATASET
// =======================

const DATA = [
  "systems process input and produce output",
  "learning improves performance over time",
  "patterns create understanding",
  "intelligence adapts to change",
  "ideas create knowledge",
  "feedback improves systems",
  "small changes lead to growth",
  "understanding comes from experience",
  "logic builds structure",
  "structure creates stability"
];

// =======================
// UI
// =======================

const brain = new Brain();
const chat = document.getElementById("chat");
const input = document.getElementById("input");

function add(text,type){
  const d = document.createElement("div");
  d.className = "msg " + type;
  d.textContent = text;
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}

function send(){
  const text = input.value.trim();
  if(!text) return;

  add(text,"user");
  input.value = "";

  setTimeout(()=>{
    const reply = brain.think(text);
    add(reply,"bot");
  },150);
}

input.addEventListener("keydown",e=>{
  if(e.key==="Enter") send();
});

// =======================
// OPTIONAL AUTO EVOLUTION
// =======================

const trainer = new AutoTrainer(brain, DATA);
trainer.start(500); // uncomment to enable auto-learning

</script>

</body>
</html>
